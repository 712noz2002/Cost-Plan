    function generateScenarios(items) {
      const fixed=items.filter(i=>!i.isVariable);
      const variable=items.filter(i=>i.isVariable);
      const fixedTotal=fixed.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      if(!variable.length) return [{label:"기본",items:fixed,total:fixedTotal}];
      const grouped={};
      variable.forEach(item=>{const g=item.varGroup||item.id;if(!grouped[g])grouped[g]=[];grouped[g].push(item);});
      const combos=Object.values(grouped).reduce((acc,grp)=>acc.flatMap(c=>grp.map(o=>[...c,o])),[[]]);
      return combos.map((combo,idx)=>{
        const total=fixedTotal+combo.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
        return {label:`시나리오 ${idx+1}`,subtitle:combo.map(i=>i.varLabel||i.name).join(" · "),items:[...fixed,...combo],total};
      });
    }

    // ── Firebase 훅 ─────────────────────────────────────────────
    function useFirebase() {
      const [ready, setReady] = useState(!!window.__firebaseReady);
      useEffect(()=>{
        if(window.__firebaseReady){setReady(true);return;}
        const h=()=>setReady(true);
        window.addEventListener("firebaseReady",h);
        return()=>window.removeEventListener("firebaseReady",h);
      },[]);
      return ready;
    }

    function saveProjectToFirebase(project) {
      if(!window.__db) return;
      const {__db:db,__dbRef:ref,__dbSet:set}=window;
      // items 배열을 객체로 변환 (Firebase는 배열 비선호)
      const data = {
        id: project.id,
        name: project.name,
        budget: project.budget,
        items: project.items.reduce((acc,item)=>{acc[item.id]=item;return acc;},{}),
      };
      set(ref(db, `projects/${project.id}`), data).catch(console.error);
    }

    function subscribeProject(projectId, callback) {
      if(!window.__db) return ()=>{};
      const {__db:db,__dbRef:ref,__dbOnValue:onValue}=window;
      const unsubscribe = onValue(ref(db,`projects/${projectId}`), snap=>{
        const data = snap.val();
        if(!data) {callback(null); return;}
        const items = data.items ? Object.values(data.items) : [];
        callback({...data, items});
      });
      return unsubscribe;
    }

    function removeProjectFromFirebase(projectId) {
      if(!window.__db) return;
      const {__db:db,__dbRef:ref,__dbRemove:remove}=window;
      remove(ref(db,`projects/${projectId}`)).catch(console.error);
    }

    // ── 공유 링크 감지 ──────────────────────────────────────────
    function getSharedProjectId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("share") || null;
    }

    // ── 공유 링크 복사 모달 ─────────────────────────────────────
    function ShareModal({ project, onClose }) {
      const base = window.location.href.replace(/\/[^\/]*$/, "");
      const url = `${base}/share.html?id=${project.id}`;
      const [copied, setCopied] = useState(false);
      function copy() {
        navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
      }
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(44,26,16,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:16,padding:"24px",width:"90%",maxWidth:460,boxShadow:"0 8px 32px rgba(44,26,16,0.15)"}}>
            <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:6}}>🔗 프로젝트 공유</div>

            <div style={{display:"flex",gap:8,alignItems:"center",background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:16,border:`1px solid ${C.border}`}}>
              <div style={{flex:1,fontSize:12,color:C.textSub,wordBreak:"break-all",fontFamily:"monospace"}}>{url}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={copy} style={{flex:1,background:copied?C.min:C.orange,color:"#FFF",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                {copied?"✓ 복사됨!":"링크 복사"}
              </button>
              <button onClick={onClose} style={{flex:1,background:"none",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",fontSize:14,cursor:"pointer"}}>닫기</button>
            </div>
          </div>
        </div>
      );
    }

    // ── 서브 컴포넌트 ───────────────────────────────────────────
    function ChipGroup({label,options,value,onChange,allowCustom,customPlaceholder}){
      const [showCustom,setShowCustom]=useState(false);
      const isCustom=value&&!options.includes(value);
      return(
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:8,fontWeight:600}}>{label}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {options.map(opt=>(
              <button key={opt} onClick={()=>{onChange(opt);setShowCustom(false);}}
                style={{background:value===opt?C.orange:C.card,color:value===opt?"#FFF":C.text,border:value===opt?`1px solid ${C.orange}`:`1px solid ${C.border}`,borderRadius:99,padding:"5px 14px",fontSize:12,fontWeight:value===opt?700:400,cursor:"pointer"}}>{opt}</button>
            ))}
            {allowCustom&&(
              <button onClick={()=>{setShowCustom(v=>!v);if(!showCustom)onChange("");}}
                style={{background:(showCustom||isCustom)?C.orangeLight:C.card,color:(showCustom||isCustom)?C.orange:C.textSub,border:(showCustom||isCustom)?`1px solid ${C.orange}`:`1px solid ${C.border}`,borderRadius:99,padding:"5px 14px",fontSize:12,cursor:"pointer"}}>직접 입력</button>
            )}
          </div>
          {(showCustom||isCustom)&&allowCustom&&(
            <input autoFocus value={isCustom&&!showCustom?value:(showCustom?(isCustom?value:""):value)} placeholder={customPlaceholder||"직접 입력"} onChange={e=>onChange(e.target.value)} style={{...inputStyle,marginTop:8}}/>
          )}
        </div>
      );
    }

    function DatePicker({value,onChange}){
      const [showCustom,setShowCustom]=useState(false);
      const today=new Date();
      const presets=[];
      for(let i=0;i<30;i++){
        const d=new Date(today);d.setDate(today.getDate()+i);
        const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
        presets.push({label:i===0?"오늘":`${m}/${day}`,value:`${y}-${m}-${day}`});
      }
      const shown=presets.slice(0,7);
      const isCustom=value&&!shown.map(p=>p.value).includes(value);
      return(
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:8,fontWeight:600}}>날짜</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {shown.map(p=>(

          {(showCustom||isCustom)&&<input type="date" value={value} onChange={e=>onChange(e.target.value)} style={{...inputStyle,marginTop:8}}/>}
        </div>

    }

    function AmountPicker({value,onChange,category}){

                        style={{background:form.varGroup===g?C.orangeLight:C.card,color:form.varGroup===g?C.orange:C.text,border:form.varGroup===g?`1px solid ${C.orange}`:`1px solid ${C.border}`,borderRadius:99,padding:"5px 14px",fontSize:12,cursor:"pointer"}}>{g}</button>
                    ))}
                  </div>
                  <input value={form.varGroup} placeholder="새 그룹명 입력" onChange={e=>f("varGroup",e.target.value)} style={inputStyle}/>
                </div>
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:11,color:C.textSub,marginBottom:8,fontWeight:600}}>시나리오 표시 이름</div>
                  <input value={form.varLabel} placeholder="예: 버스, 자차, 3R 승리" onChange={e=>f("varLabel",e.target.value)} style={inputStyle}/>

            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button onClick={()=>{if(!form.name||!form.amount)return;onSave(form);}} style={{flex:1,background:C.orange,color:"#FFF",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(224,90,41,0.3)"}}>저장</button>
              <button onClick={onClose} style={{flex:1,background:"none",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",fontSize:14,cursor:"pointer"}}>취소</button>
            </div>
          </div>
        </div>
      );

    function RenameModal({current,onClose,onSave}){
      const [name,setName]=useState(current);

        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(44,26,16,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:14,padding:"24px",width:320,boxShadow:"0 8px 32px rgba(44,26,16,0.15)"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>프로젝트 이름 변경</div>
            <input autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onSave(name)} style={{...inputStyle,marginBottom:14}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onSave(name)} style={{flex:1,background:C.orange,color:"#FFF",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>저장</button>
              <button onClick={onClose} style={{flex:1,background:"none",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",fontSize:13,cursor:"pointer"}}>취소</button>
            </div>
          </div>
        </div>
      );

    // ── 프로젝트 뷰 ─────────────────────────────────────────────
    function ProjectView({project,onUpdate,isShared}){
      const {items,budget}=project;
      const setItems=next=>onUpdate({...project,items:typeof next==="function"?next(items):next});
      const setBudget=v=>onUpdate({...project,budget:v});

      const [tab,setTab]=useState("items");
      const [showForm,setShowForm]=useState(false);
      const [editItem,setEditItem]=useState(null);
      const [expandedScenario,setExpandedScenario]=useState(null);
      const [showDownloadMenu,setShowDownloadMenu]=useState(false);
      const [showShareModal,setShowShareModal]=useState(false);
      const dlRef=useRef(null);

      useEffect(()=>{
        const h=e=>{if(dlRef.current&&!dlRef.current.contains(e.target))setShowDownloadMenu(false);};
        document.addEventListener("mousedown",h);
        return()=>document.removeEventListener("mousedown",h);
      },[]);

      const scenarios=useMemo(()=>generateScenarios(items),[items]);
      const minS=scenarios.reduce((a,b)=>a.total<b.total?a:b,scenarios[0]);
      const maxS=scenarios.reduce((a,b)=>a.total>b.total?a:b,scenarios[0]);
      const budgetNum=parseFloat(budget)||0;
      const destinations=[...new Set(items.map(i=>i.destination).filter(Boolean))];
      const grouped=destinations.reduce((acc,d)=>{acc[d]=items.filter(i=>i.destination===d);return acc;},{});
      const noDestItems=items.filter(i=>!i.destination);
      const existingVarGroups=[...new Set(items.filter(i=>i.isVariable).map(i=>i.varGroup).filter(Boolean))];
      const destOptions=[...new Set([...PRESET_DESTINATIONS,...destinations])];

      async function captureTab(targetTab,format){
        setShowDownloadMenu(false);
        const prevTab=tab;
        if(tab!==targetTab){setTab(targetTab);await new Promise(r=>setTimeout(r,400));}
        const prevExp=expandedScenario;
        if(targetTab==="scenarios"){setExpandedScenario(null);await new Promise(r=>setTimeout(r,200));}
        const el=document.getElementById("capture-area");
        const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#F2ECEC"});
        const imgData=canvas.toDataURL("image/jpeg",0.95);
        const label=targetTab==="items"?"내역":"시나리오";
        const fname=`${project.name}_${label}`;
        if(format==="jpg"){const a=document.createElement("a");a.href=imgData;a.download=`${fname}.jpg`;a.click();}
        else{const{jsPDF}=window.jspdf;const w=canvas.width/2,h=canvas.height/2;const pdf=new jsPDF({orientation:w>h?"l":"p",unit:"px",format:[w,h]});pdf.addImage(imgData,"JPEG",0,0,w,h);pdf.save(`${fname}.pdf`);}
        setTab(prevTab);setExpandedScenario(prevExp);
      }

      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
          {/* 탭 바 */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`,background:C.bgHeader,padding:"0 16px",flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex"}}>
              {[["items","내역"],["scenarios","시나리오"]].map(([k,l])=>(
                <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",cursor:"pointer",padding:"13px 16px",fontSize:13,fontWeight:600,color:tab===k?C.orange:C.textSub,borderBottom:tab===k?`2px solid ${C.orange}`:"2px solid transparent"}}>{l}</button>
              ))}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:C.textSub,marginBottom:1}}>예산</div>
                <input value={budget} onChange={e=>setBudget(e.target.value.replace(/\D/g,""))}
                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,color:C.orange,fontSize:13,fontWeight:700,padding:"3px 8px",width:110,textAlign:"right",outline:"none"}}/>
              </div>
              {/* 공유 버튼 (공유 모드가 아닐 때만) */}

                <button onClick={()=>setShowShareModal(true)} style={{background:C.orangeLight,border:`1px solid ${C.orangeDim}`,borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,color:C.orange,cursor:"pointer",whiteSpace:"nowrap"}}>🔗 공유</button>
              )}
              <div ref={dlRef} style={{position:"relative"}}>
                <button onClick={()=>setShowDownloadMenu(v=>!v)} style={{background:C.orange,color:"#FFF",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>

                    <button onClick={()=>captureTab("items","pdf")} style={{width:"100%",padding:"9px 16px",background:"none",border:"none",textAlign:"left",fontSize:13,color:C.text,cursor:"pointer"}}>📄 PDF로 저장</button>
                    <div style={{margin:"3px 14px",height:1,background:C.border}}/>
                    <div style={{padding:"5px 14px 4px",fontSize:10,color:C.textMuted,fontWeight:700,letterSpacing:1}}>시나리오 탭</div>
                    <button onClick={()=>captureTab("scenarios","jpg")} style={{width:"100%",padding:"9px 16px",background:"none",border:"none",textAlign:"left",fontSize:13,color:C.text,cursor:"pointer"}}>🖼 JPG로 저장</button>
                    <button onClick={()=>captureTab("scenarios","pdf")} style={{width:"100%",padding:"9px 16px 13px",background:"none",border:"none",textAlign:"left",fontSize:13,color:C.text,cursor:"pointer"}}>📄 PDF로 저장</button>
                  </div>

            </div>
          </div>

          <div id="capture-area" style={{flex:1,overflowY:"auto",padding:"20px 18px",background:C.bg}}>
            {tab==="items"&&(
              <>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))",gap:10,marginBottom:18}}>
                  {[
                    {label:"전체 항목",value:items.length+"개"},
                    {label:"고정 지출",value:fmt(items.filter(i=>!i.isVariable).reduce((s,i)=>s+(parseFloat(i.amount)||0),0))},
                    {label:"최저 예상",value:minS?fmt(minS.total):"-",accent:C.min},
                    {label:"최고 예상",value:maxS?fmt(maxS.total):"-",accent:C.max},
                  ].map((c,i)=>(
                    <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                      <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>{c.label}</div>
                      <div style={{fontSize:15,fontWeight:700,color:c.accent||C.text}}>{c.value}</div>
                    </div>
                  ))}
                </div>
                {budgetNum>0&&maxS&&(
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:18,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontSize:12,color:C.textSub}}>예산 대비 최고 예상</span>
                      <span style={{fontSize:12,color:maxS.total>budgetNum?C.max:C.min,fontWeight:700}}>{fmt(maxS.total)} / {fmt(budgetNum)}</span>

                    <div style={{height:5,background:C.border,borderRadius:99,overflow:"hidden"}}>
                      <div style={{height:"100%",borderRadius:99,width:Math.min(100,(maxS.total/budgetNum)*100)+"%",background:maxS.total>budgetNum?C.max:C.orange}}/>
                    </div>
                    <div style={{fontSize:11,color:C.textSub,marginTop:6}}>
                      {maxS.total<=budgetNum?`여유 ${fmt(budgetNum-maxS.total)} (최악 기준)`:`예산 초과 ${fmt(maxS.total-budgetNum)}`}
                    </div>

                )}
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
                  <button onClick={()=>{setEditItem(null);setShowForm(true);}} style={{background:C.orange,color:"#FFF",border:"none",borderRadius:9,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(224,90,41,0.3)"}}>+ 항목 추가</button>
                </div>
                {[...destinations.map(d=>[d,grouped[d]]),noDestItems.length?["미지정",noDestItems]:null].filter(Boolean).map(([dest,destItems])=>(

                    <div style={{fontSize:10,color:C.textSub,letterSpacing:2,marginBottom:10,fontWeight:700,display:"flex",alignItems:"center",gap:7}}>

                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:7}}>

                        const cc=CATEGORY_COLORS[item.category]||CATEGORY_COLORS["기타"];
                        return(
                          <div key={item.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,borderLeft:item.isVariable?`3px solid ${C.orange}`:`3px solid ${C.border}`,boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3,flexWrap:"wrap"}}>
                                <span style={{fontSize:13,fontWeight:500}}>{item.name}</span>
                                <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:cc.bg,color:cc.text,fontWeight:600}}>{item.category}</span>

                              </div>
                              {item.date&&<div style={{fontSize:11,color:C.textMuted}}>{item.date}</div>}
                            </div>
                            <div style={{fontSize:14,fontWeight:700,color:C.text,whiteSpace:"nowrap"}}>{fmt(parseFloat(item.amount)||0)}</div>
                            <div style={{display:"flex",gap:5}}>
                              <button onClick={()=>{setEditItem(item);setShowForm(true);}} style={{background:C.orangeLight,border:`1px solid ${C.orangeDim}`,borderRadius:6,padding:"4px 8px",color:C.orange,fontSize:11,fontWeight:600,cursor:"pointer"}}>수정</button>
                              <button onClick={()=>setItems(items.filter(i=>i.id!==item.id))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",color:C.textSub,fontSize:11,cursor:"pointer"}}>삭제</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </>
            )}

            {tab==="scenarios"&&(
              <>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))",gap:10,marginBottom:22}}>
                  {[
                    {label:"시나리오 수",value:scenarios.length+"개"},
                    {label:"최저 비용",value:fmt(minS?.total||0),accent:C.min},
                    {label:"최고 비용",value:fmt(maxS?.total||0),accent:C.max},
                    {label:"변동 폭",value:fmt((maxS?.total||0)-(minS?.total||0)),accent:C.orange},
                  ].map((c,i)=>(
                    <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>
                      <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>{c.label}</div>
                      <div style={{fontSize:15,fontWeight:700,color:c.accent||C.text}}>{c.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {scenarios.map((s,i)=>{
                    const isMin=s===minS,isMax=s===maxS;
                    const ratio=budgetNum?s.total/budgetNum:0;
                    const isExp=expandedScenario===i;
                    return(
                      <div key={i} style={{background:C.card,border:isMin?`1px solid ${C.minBorder}`:isMax?`1px solid ${C.maxBorder}`:`1px solid ${C.border}`,borderRadius:13,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                        <div onClick={()=>setExpandedScenario(isExp?null:i)} style={{padding:"15px 17px",cursor:"pointer",background:isMin?C.minBg:isMax?C.maxBg:C.card}}>
                          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:budgetNum>0?8:0}}>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                                <span style={{fontSize:13,fontWeight:700}}>{s.label}</span>
                                {isMin&&<span style={{fontSize:10,background:C.minBg,color:C.min,padding:"2px 7px",borderRadius:99,fontWeight:700,border:`1px solid ${C.minBorder}`}}>최저</span>}
                                {isMax&&<span style={{fontSize:10,background:C.maxBg,color:C.max,padding:"2px 7px",borderRadius:99,fontWeight:700,border:`1px solid ${C.maxBorder}`}}>최고</span>}
                              </div>
                              {s.subtitle&&<div style={{fontSize:12,color:C.textSub}}>{s.subtitle}</div>}
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{fontSize:17,fontWeight:700,color:isMin?C.min:isMax?C.max:C.orange,whiteSpace:"nowrap"}}>{fmt(s.total)}</div>
                              <span style={{fontSize:13,color:C.textSub,display:"inline-block",transform:isExp?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                            </div>
                          </div>
                          {budgetNum>0&&(
                            <div>
                              <div style={{height:4,background:C.border,borderRadius:99,overflow:"hidden"}}>
                                <div style={{height:"100%",borderRadius:99,width:Math.min(100,ratio*100)+"%",background:s.total>budgetNum?C.max:isMin?C.min:C.orange}}/>
                              </div>
                              <div style={{fontSize:11,color:C.textSub,marginTop:5}}>
                                예산 {fmt(budgetNum)} 대비 {(ratio*100).toFixed(1)}%{s.total<=budgetNum?` · 여유 ${fmt(budgetNum-s.total)}`:`· 초과 ${fmt(s.total-budgetNum)}`}
                              </div>
                            </div>
                          )}
                        </div>
                        {isExp&&(
                          <div style={{borderTop:`1px solid ${C.border}`,padding:"12px 17px 15px",background:C.cardAlt}}>
                            <div style={{fontSize:10,color:C.textSub,letterSpacing:1,marginBottom:10,fontWeight:600}}>전체 항목 ({s.items.length}개)</div>
                            <div style={{display:"flex",flexDirection:"column",gap:7}}>
                              {s.items.map((item,j)=>{
                                const cc=CATEGORY_COLORS[item.category]||CATEGORY_COLORS["기타"];
                                return(
                                  <div key={j} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:C.card,borderRadius:9,border:`1px solid ${C.border}`,borderLeft:item.isVariable?`3px solid ${C.orange}`:`3px solid ${C.border}`}}>
                                    <div style={{flex:1,minWidth:0}}>
                                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                        <span style={{fontSize:13,fontWeight:500}}>{item.name}</span>
                                        <span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:cc.bg,color:cc.text,fontWeight:600}}>{item.category}</span>
                                        {item.isVariable&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:C.orangeLight,color:C.orange,fontWeight:600}}>변동</span>}
                                      </div>
                                      {item.date&&<div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{item.date}{item.destination?` · ${item.destination}`:""}</div>}
                                    </div>
                                    <div style={{fontSize:13,fontWeight:700,color:C.text,whiteSpace:"nowrap"}}>{fmt(parseFloat(item.amount)||0)}</div>
                                  </div>
                                );
                              })}
                            </div>
                            <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
                              <span style={{fontSize:12,color:C.textSub,fontWeight:600}}>합계</span>
                              <span style={{fontSize:15,fontWeight:700,color:isMin?C.min:isMax?C.max:C.orange}}>{fmt(s.total)}</span>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {showForm&&(
            <ItemModal
              onClose={()=>{setShowForm(false);setEditItem(null);}}
              onSave={form=>{
                if(editItem) setItems(items.map(i=>i.id===editItem.id?{...form,id:editItem.id}:i));
                else setItems([...items,{...form,id:uid()}]);
                setShowForm(false);setEditItem(null);
              }}
              editItem={editItem}
              existingVarGroups={existingVarGroups}
              destOptions={destOptions}
            />
          )}
          {showShareModal&&<ShareModal project={project} onClose={()=>setShowShareModal(false)}/>}
        </div>
      );
    }

    // ── 메인 앱 ─────────────────────────────────────────────────
    function App(){
      const fbReady = useFirebase();
      const sharedProjectId = getSharedProjectId();

      // ── 비밀번호 (공유 모드가 아닐 때만) ──────────────────────
      const PW = "022362";
      const [pwInput, setPwInput] = useState("");
      const [pwError, setPwError] = useState(false);
      const [pwUnlocked, setPwUnlocked] = useState(()=>{
        try{ return sessionStorage.getItem("tc-unlocked")==="1"; }catch{ return false; }
      });

      function tryUnlock(){
        if(pwInput===PW){
          setPwUnlocked(true);
          try{sessionStorage.setItem("tc-unlocked","1");}catch{}
        } else {
          setPwError(true);
          setTimeout(()=>setPwError(false),1500);
        }
      }

      // ── 공유 모드 ──────────────────────────────────────────────
      const [sharedProject, setSharedProject] = useState(null);
      const [sharedLoading, setSharedLoading] = useState(!!sharedProjectId);
      const [sharedNotFound, setSharedNotFound] = useState(false);

      useEffect(()=>{
        if(!sharedProjectId||!fbReady) return;
        const unsub = subscribeProject(sharedProjectId, data=>{
          setSharedLoading(false);
          if(!data){setSharedNotFound(true);return;}
          setSharedProject(data);
        });
        return unsub;
      },[sharedProjectId,fbReady]);

      function updateSharedProject(updated){
        saveProjectToFirebase(updated);
        setSharedProject(updated);
      }

      if(sharedProjectId){
        if(sharedLoading) return(
          <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:C.bg,flexDirection:"column",gap:12}}>
            <div style={{fontSize:24}}>⏳</div>
            <div style={{fontSize:14,color:C.textSub}}>프로젝트 불러오는 중...</div>
          </div>
        );
        if(sharedNotFound) return(
          <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:C.bg,flexDirection:"column",gap:12}}>
            <div style={{fontSize:24}}>😕</div>
            <div style={{fontSize:16,fontWeight:700,color:C.text}}>프로젝트를 찾을 수 없어요</div>
            <div style={{fontSize:13,color:C.textSub}}>링크가 잘못됐거나 삭제된 프로젝트예요.</div>
          </div>
        );
        if(!sharedProject) return null;
        return(
          <div style={{display:"flex",height:"100vh",flexDirection:"column",background:C.bgApp,fontFamily:"Pretendard, sans-serif",color:C.text}}>
            <div style={{padding:"14px 18px",background:C.bgHeader,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:18}}>🔗</div>
              <div>
                <div style={{fontSize:10,color:C.textSub,letterSpacing:2,fontWeight:600}}>공유된 프로젝트</div>
                <div style={{fontSize:18,fontWeight:800,color:C.text}}>{sharedProject.name}</div>
              </div>
            </div>
            <ProjectView project={sharedProject} onUpdate={updateSharedProject} isShared={true}/>
          </div>
        );
      }

      // ── 일반 모드 ──────────────────────────────────────────────
      // 비밀번호 화면
      if(!pwUnlocked) return(
        <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:C.bg,fontFamily:"Pretendard, sans-serif"}}>
          <div style={{background:C.card,borderRadius:20,padding:"36px 32px",width:"90%",maxWidth:360,boxShadow:"0 8px 40px rgba(44,26,16,0.12)",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:12}}>🔐</div>
            <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:6}}>여행 비용 관리</div>
            <div style={{fontSize:13,color:C.textSub,marginBottom:24}}>비밀번호를 입력해주세요</div>
            <input
              type="password" value={pwInput} placeholder="비밀번호"
              onChange={e=>setPwInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&tryUnlock()}
              style={{...inputStyle, textAlign:"center", fontSize:18, letterSpacing:4, marginBottom:12,
                border:`1px solid ${pwError?C.max:C.border}`,
                transition:"border 0.2s"}}
            />
            {pwError && <div style={{fontSize:12,color:C.max,marginBottom:8}}>비밀번호가 틀렸어요</div>}
            <button onClick={tryUnlock} style={{width:"100%",background:C.orange,color:"#FFF",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(224,90,41,0.3)"}}>
              확인
            </button>
          </div>
        </div>
      );

      function loadProjects(){
        try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):[{id:"p1",name:"프로젝트 1",budget:"1000000",items:SAMPLE_ITEMS}];}
        catch{return [{id:"p1",name:"프로젝트 1",budget:"1000000",items:SAMPLE_ITEMS}];}
      }
      function loadActiveId(){return localStorage.getItem(ACTIVE_KEY)||"p1";}

      const [projects,setProjectsRaw]=useState(loadProjects);
      const [activeId,setActiveIdRaw]=useState(loadActiveId);
      const [renaming,setRenaming]=useState(null);
      const [confirmDelete,setConfirmDelete]=useState(null);
      const [sidebarOpen,setSidebarOpen]=useState(true);
      const [fbLoaded,setFbLoaded]=useState(false);

      // Firebase에서 전체 프로젝트 목록 실시간 구독
      useEffect(()=>{
        if(!fbReady) return;
        const {__db:db,__dbRef:ref,__dbOnValue:onValue}=window;
        const unsub=onValue(ref(db,"projects"),(snap)=>{
          const data=snap.val();
          if(!data){
            // Firebase에 아무것도 없으면 localStorage 데이터를 Firebase에 올림
            const local=loadProjects();
            local.forEach(p=>saveProjectToFirebase(p));
            setFbLoaded(true);
            return;
          }
          // Firebase 데이터를 프로젝트 배열로 변환
          const fbProjects=Object.values(data).map(p=>({
            ...p,
            items: p.items ? Object.values(p.items) : [],
          }));
          // localStorage에도 캐시
          try{localStorage.setItem(STORAGE_KEY,JSON.stringify(fbProjects));}catch{}
          setProjectsRaw(fbProjects);
          setFbLoaded(true);
        });
        return unsub;
      },[fbReady]);

      function setProjects(fn){
        setProjectsRaw(prev=>{
          const next=typeof fn==="function"?fn(prev):fn;
          try{localStorage.setItem(STORAGE_KEY,JSON.stringify(next));}catch{}
          return next;
        });
      }
      function setActiveId(id){setActiveIdRaw(id);try{localStorage.setItem(ACTIVE_KEY,id);}catch{}}

      const active=projects.find(p=>p.id===activeId);

      function addProject(){
        const id="p"+Date.now();
        const newP={id,name:`프로젝트 ${projects.length+1}`,budget:"500000",items:[]};
        setProjects(ps=>[...ps,newP]);
        if(fbReady) saveProjectToFirebase(newP);
        setActiveId(id);
      }

      function updateProject(updated){
        setProjects(ps=>ps.map(p=>p.id===updated.id?updated:p));
        if(fbReady) saveProjectToFirebase(updated);
      }

      function deleteProject(id){
        const next=projects.filter(p=>p.id!==id);
        setProjects(next);
        if(fbReady) removeProjectFromFirebase(id);
        if(activeId===id) setActiveId(next[0]?.id||null);
        setConfirmDelete(null);
      }

      const isMobile=window.innerWidth<640;

      return(
        <div style={{display:"flex",height:"100vh",background:C.bgApp,fontFamily:"Pretendard, sans-serif",color:C.text,overflow:"hidden"}}>
          {sidebarOpen&&isMobile&&(
            <div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:10}}/>
          )}

          {/* 사이드바 */}
          <div style={{
            width:sidebarOpen?220:0, minWidth:sidebarOpen?220:0,
            background:C.sidebar, borderRight:sidebarOpen?`1px solid ${C.border}`:"none",
            display:"flex", flexDirection:"column", flexShrink:0, overflow:"hidden",
            transition:"width 0.22s ease, min-width 0.22s ease",
            position:isMobile?"fixed":"relative",
            zIndex:isMobile?20:"auto", height:"100%", top:0, left:0,
          }}>
            <div style={{padding:"20px 18px 14px",whiteSpace:"nowrap"}}>
              <div style={{fontSize:10,color:C.textSub,letterSpacing:3,marginBottom:3,fontWeight:600}}>TRAVEL COST</div>
              <div style={{fontSize:17,fontWeight:800,color:C.text}}>여행 비용 관리</div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"4px 10px",whiteSpace:"nowrap"}}>
              {projects.map(p=>{
                const isActive=p.id===activeId;
                const minS=(()=>{const sc=generateScenarios(p.items);return sc.reduce((a,b)=>a.total<b.total?a:b,sc[0]);})();
                return(
                  <div key={p.id} onClick={()=>{setActiveId(p.id);if(isMobile)setSidebarOpen(false);}}
                    style={{borderRadius:10,padding:"10px 12px",marginBottom:4,cursor:"pointer",background:isActive?C.orange:"transparent",color:isActive?"#FFF":C.text,position:"relative"}}>
                    <div style={{fontSize:13,fontWeight:isActive?700:500,marginBottom:2,paddingRight:40}}>{p.name}</div>
                    <div style={{fontSize:11,color:isActive?"rgba(255,255,255,0.75)":C.textSub}}>{fmt(minS?.total||0)} ~</div>
                    <div style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",display:"flex",gap:3}} onClick={e=>e.stopPropagation()}>
                      <button onClick={()=>setRenaming(p.id)}
                        style={{background:isActive?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.06)",border:"none",borderRadius:5,padding:"3px 6px",fontSize:11,color:isActive?"#FFF":C.textSub,cursor:"pointer"}}>✎</button>
                      {projects.length>1&&(
                        <button onClick={()=>setConfirmDelete(p.id)}
                          style={{background:isActive?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.06)",border:"none",borderRadius:5,padding:"3px 6px",fontSize:11,color:isActive?"#FFF":C.textSub,cursor:"pointer"}}>✕</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{padding:"10px 10px 16px",whiteSpace:"nowrap"}}>
              <button onClick={addProject}
                style={{width:"100%",background:"none",border:`1.5px dashed ${C.border}`,borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,color:C.textSub,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                + 프로젝트 추가
              </button>
            </div>
          </div>

          {/* 메인 */}
          <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
            <div style={{padding:"12px 16px",background:C.bgHeader,borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setSidebarOpen(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",padding:"4px 6px",borderRadius:7,color:C.textSub,fontSize:18,lineHeight:1,flexShrink:0}}>
                {sidebarOpen?"◀":"▶"}
              </button>
              <div>
                <div style={{fontSize:10,color:C.textSub,letterSpacing:2,fontWeight:600,marginBottom:1}}>PROJECT</div>
                <div style={{fontSize:18,fontWeight:800,color:C.text}}>{active?.name}</div>
              </div>
            </div>
            {active?(
              <ProjectView key={active.id} project={active} onUpdate={updateProject} isShared={false}/>
            ):(
              <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.textSub,fontSize:14}}>
                프로젝트를 선택하거나 추가해주세요
              </div>
            )}
          </div>

          {renaming&&(
            <RenameModal current={projects.find(p=>p.id===renaming)?.name||""} onClose={()=>setRenaming(null)}
              onSave={name=>{
                const updated=projects.find(p=>p.id===renaming);
                if(updated){
                  const newP={...updated,name};
                  setProjects(ps=>ps.map(p=>p.id===renaming?newP:p));
                  if(fbReady) saveProjectToFirebase(newP);
                }
                setRenaming(null);
              }}/>
          )}
          {confirmDelete&&(
            <div onClick={()=>setConfirmDelete(null)} style={{position:"fixed",inset:0,background:"rgba(44,26,16,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
              <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:14,padding:"24px",width:300,boxShadow:"0 8px 32px rgba(44,26,16,0.15)",textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:8}}>프로젝트 삭제</div>
                <div style={{fontSize:13,color:C.textSub,marginBottom:20}}>
                  <b style={{color:C.text}}>{projects.find(p=>p.id===confirmDelete)?.name}</b>을 삭제할까요?<br/>이 작업은 되돌릴 수 없습니다.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setConfirmDelete(null)} style={{flex:1,background:"none",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",fontSize:13,cursor:"pointer"}}>취소</button>
                  <button onClick={()=>deleteProject(confirmDelete)} style={{flex:1,background:C.max,color:"#FFF",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>삭제</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
