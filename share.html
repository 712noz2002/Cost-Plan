    // ── 시나리오 계산 ───────────────────────────────────────────
    function generateScenarios(items) {
      const fixed=items.filter(i=>!i.isVariable);
      const variable=items.filter(i=>i.isVariable);
      const fixedTotal=fixed.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      if(!variable.length) return [{label:"기본",items:fixed,total:fixedTotal}];
      const grouped={};
      variable.forEach(item=>{const g=item.varGroup||item.id;if(!grouped[g])grouped[g]=[];grouped[g].push(item);});
      const combos=Object.values(grouped).reduce((acc,grp)=>acc.flatMap(c=>grp.map(o=>[...c,o])),[[]]);
      return combos.map((combo,idx)=>{
        const total=fixedTotal+combo.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
        return {label:`시나리오 ${idx+1}`,subtitle:combo.map(i=>i.varLabel||i.name).join(" · "),items:[...fixed,...combo],total};
      });
    }

    // 인원 기준 시나리오 금액 계산
    function calcPersonAmount(item, members) {
      const amt = parseFloat(item.amount)||0;
      if (item.isPersonal) return amt;
      const n = members.length || 1;
      return amt / n;
    }

    // 정산 계산 (최소 송금)
    function calcSettlement(settleItems, members) {
      if (!members.length) return [];
      const balance = {};
      members.forEach(m => balance[m] = 0);

      settleItems.forEach(item => {
        const amt = parseFloat(item.actualAmount||item.amount)||0;
        const participants = (item.settleParticipants||[]).filter(p=>members.includes(p));
        const payer = item.settlePayer;
        if (!participants.length || !payer || !members.includes(payer)) return;
        const share = amt / participants.length;
        participants.forEach(p => {
          if (p !== payer) {
            balance[p] = (balance[p]||0) - share;
            balance[payer] = (balance[payer]||0) + share;
          }
        });
      });

      const result = [];
      const debtors = Object.entries(balance).filter(([,v])=>v<-0.5).sort((a,b)=>a[1]-b[1]);
      const creditors = Object.entries(balance).filter(([,v])=>v>0.5).sort((a,b)=>b[1]-a[1]);
      const d = debtors.map(([n,v])=>({name:n,val:-v}));
      const c = creditors.map(([n,v])=>({name:n,val:v}));
      let i=0,j=0;
      while(i<d.length&&j<c.length){
        const amount=Math.min(d[i].val,c[j].val);
        if(amount>0.5) result.push({from:d[i].name,to:c[j].name,amount:Math.round(amount)});
        d[i].val-=amount; c[j].val-=amount;
        if(d[i].val<0.5) i++; if(c[j].val<0.5) j++;
      }
      return result;
    }

    // ── Firebase ────────────────────────────────────────────────
    function useFirebase() {
      const [ready,setReady]=useState(!!window.__firebaseReady);
      useEffect(()=>{
        if(window.__firebaseReady){setReady(true);return;}
        const h=()=>setReady(true);
        window.addEventListener("firebaseReady",h);
        return()=>window.removeEventListener("firebaseReady",h);
      },[]);
      return ready;
    }

    function saveProjectToFirebase(project) {
      if(!window.__db) return;
      const data = {
        id:project.id, name:project.name, budget:project.budget,
        members:project.members||[],
        settleItems:project.settleItems||[],
        settledPairs:project.settledPairs||[],
        items:project.items.reduce((acc,item)=>{acc[item.id]=item;return acc;},{}),
      };
      window.__dbSet(window.__dbRef(window.__db,`projects/${project.id}`),data).catch(console.error);
    }

    function subscribeProject(projectId,callback){
      if(!window.__db) return()=>{};
      const unsub=window.__dbOnValue(window.__dbRef(window.__db,`projects/${projectId}`),snap=>{
        const data=snap.val();
        if(!data){callback(null);return;}
        callback({...data,items:data.items?Object.values(data.items):[],members:data.members||[],settleItems:data.settleItems||[],settledPairs:data.settledPairs||[]});
      });
      return unsub;
    }

    function removeProjectFromFirebase(id){
      if(!window.__db) return;
      window.__dbRemove(window.__dbRef(window.__db,`projects/${id}`)).catch(console.error);
    }

                  <input value={form.varLabel} placeholder="예: 버스, 자차" onChange={e=>f("varLabel",e.target.value)} style={inputStyle}/>
                </div>
              </>
            )}

            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button onClick={()=>{if(!form.name||!form.amount)return;onSave(form);}} style={{flex:1,background:C.orange,color:"#FFF",border:"none",borderRadius:10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(224,90,41,0.3)"}}>저장</button>
              <button onClick={onClose} style={{flex:1,background:"none",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",fontSize:14,cursor:"pointer"}}>취소</button>
            </div>
          </div>
        </div>
      );
    }

    // ── 이름 변경 모달 ───────────────────────────────────────────
    function RenameModal({current,onClose,onSave}){
      const [name,setName]=useState(current);
      return(
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(44,26,16,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:14,padding:"24px",width:320,boxShadow:"0 8px 32px rgba(44,26,16,0.15)"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>프로젝트 이름 변경</div>
            <input autoFocus value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onSave(name)} style={{...inputStyle,marginBottom:14}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onSave(name)} style={{flex:1,background:C.orange,color:"#FFF",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>저장</button>
              <button onClick={onClose} style={{flex:1,background:"none",color:C.textSub,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",fontSize:13,cursor:"pointer"}}>취소</button>
            </div>
          </div>
        </div>
      );
    }

    // ── 필터 버튼 ────────────────────────────────────────────────
    function FilterBar({members,selected,onChange}){
      return(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"10px 16px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
          <button onClick={()=>onChange("all")}
            style={{background:selected==="all"?C.orange:C.card,color:selected==="all"?"#FFF":C.text,border:selected==="all"?`1px solid ${C.orange}`:`1px solid ${C.border}`,borderRadius:99,padding:"4px 14px",fontSize:12,fontWeight:selected==="all"?700:400,cursor:"pointer"}}>전체</button>
          {members.map(m=>(
            <button key={m} onClick={()=>onChange(m)}
              style={{background:selected===m?C.orange:C.card,color:selected===m?"#FFF":C.text,border:selected===m?`1px solid ${C.orange}`:`1px solid ${C.border}`,borderRadius:99,padding:"4px 14px",fontSize:12,fontWeight:selected===m?700:400,cursor:"pointer"}}>{m}</button>
          ))}
        </div>
      );
    }

    // ── 계획 탭 ─────────────────────────────────────────────────
    function PlanTab({project,onUpdate}){
      const {items,budget,members=[]}=project;
      const setItems=next=>onUpdate({...project,items:typeof next==="function"?next(items):next});
      const setBudget=v=>onUpdate({...project,budget:v});

      const [showForm,setShowForm]=useState(false);
      const [editItem,setEditItem]=useState(null);
      const [filter,setFilter]=useState("all");

      const budgetNum=parseFloat(budget)||0;
      const n=members.length||1;

      const scenarios=useMemo(()=>generateScenarios(items),[items]);
      const minS=scenarios.reduce((a,b)=>a.total<b.total?a:b,scenarios[0]);
      const maxS=scenarios.reduce((a,b)=>a.total>b.total?a:b,scenarios[0]);

      // 필터 적용
      const filteredItems=useMemo(()=>{
        if(filter==="all") return [...items].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
        return [...items].filter(item=>{
          if(item.isPersonal) return item.personalOwner===filter;
          return true; // 공동 항목은 모든 인원에게 표시
        }).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
      },[items,filter]);

      // 필터 기준 금액 계산
      const calcAmt=item=>{
        const amt=parseFloat(item.amount)||0;
        if(filter==="all") return amt;
        if(item.isPersonal) return amt;
        return amt/n;
      };

      const totalAmt=filteredItems.reduce((s,i)=>s+calcAmt(i),0);
      const fixedAmt=filteredItems.filter(i=>!i.isVariable).reduce((s,i)=>s+calcAmt(i),0);
      const perPersonMin=filter==="all"&&members.length>0?((minS?.total||0)/n):null;
      const perPersonMax=filter==="all"&&members.length>0?((maxS?.total||0)/n):null;

      const destinations=[...new Set(items.map(i=>i.destination).filter(Boolean))];
      const destOptions=[...new Set([...PRESET_DESTINATIONS,...destinations])];

      // 날짜별 그룹핑
      const dateGroups={};
      filteredItems.forEach(item=>{
        const k=item.date||"날짜 미지정";
        if(!dateGroups[k]) dateGroups[k]=[];
        dateGroups[k].push(item);
      });

      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
          {members.length>0&&<FilterBar members={members} selected={filter} onChange={setFilter}/>}
          <div style={{flex:1,overflowY:"auto",padding:"18px 16px",background:C.bg}}>

            {/* 요약 카드 */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))",gap:10,marginBottom:16}}>
              {filter==="all"?(
                <>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>전체 항목</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text}}>{items.length}개</div>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>고정 지출</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text}}>{fmt(items.filter(i=>!i.isVariable).reduce((s,i)=>s+(parseFloat(i.amount)||0),0))}</div>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>최저 예상</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.min}}>{fmt(minS?.total||0)}</div>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>최고 예상</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.max}}>{fmt(maxS?.total||0)}</div>
                  </div>
                  {members.length>0&&(
                    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                      <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>1인당 예상</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.orange}}>{fmt(perPersonMin||0)} ~ {fmt(perPersonMax||0)}</div>
                    </div>
                  )}
                </>
              ):(
                <>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>{filter} 항목</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text}}>{filteredItems.length}개</div>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>예상 합계</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.orange}}>{fmt(totalAmt)}</div>
                  </div>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                    <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>고정 지출</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.text}}>{fmt(fixedAmt)}</div>
                  </div>
                </>
              )}
            </div>

            {/* 예산 바 */}
            {budgetNum>0&&filter==="all"&&maxS&&(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,color:C.textSub}}>예산 대비 최고 예상</span>
                  <span style={{fontSize:12,color:maxS.total>budgetNum?C.max:C.min,fontWeight:700}}>{fmt(maxS.total)} / {fmt(budgetNum)}</span>
                </div>
                <div style={{height:5,background:C.border,borderRadius:99,overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:99,width:Math.min(100,(maxS.total/budgetNum)*100)+"%",background:maxS.total>budgetNum?C.max:C.orange}}/>
                </div>
                <div style={{fontSize:11,color:C.textSub,marginTop:6}}>
                  {maxS.total<=budgetNum?`여유 ${fmt(budgetNum-maxS.total)}`:`예산 초과 ${fmt(maxS.total-budgetNum)}`}
                </div>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
              <button onClick={()=>{setEditItem(null);setShowForm(true);}} style={{background:C.orange,color:"#FFF",border:"none",borderRadius:9,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(224,90,41,0.3)"}}>+ 항목 추가</button>
            </div>

            {Object.entries(dateGroups).map(([date,dateItems])=>(
              <div key={date} style={{marginBottom:20}}>
                <div style={{fontSize:10,color:C.textSub,letterSpacing:2,marginBottom:10,fontWeight:700,display:"flex",alignItems:"center",gap:7}}>
                  <span style={{width:16,height:1,background:C.border,display:"inline-block"}}/>{date}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {dateItems.map(item=>{
                    const cc=CATEGORY_COLORS[item.category]||CATEGORY_COLORS["기타"];
                    const amt=calcAmt(item);
                    return(
                      <div key={item.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:11,padding:"12px 14px",display:"flex",alignItems:"center",gap:10,borderLeft:item.isVariable?`3px solid ${C.orange}`:item.isPersonal?`3px solid #7B8CE6`:`3px solid ${C.border}`}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                            <span style={{fontSize:13,fontWeight:500}}>{item.name}</span>
                            <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:cc.bg,color:cc.text,fontWeight:600}}>{item.category}</span>
                            {item.isPersonal?<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#EEEEF8",color:"#4A5AB0",fontWeight:600}}>개인{item.personalOwner?` · ${item.personalOwner}`:""}</span>:<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#F0EDED",color:"#6B5550",fontWeight:600}}>공동</span>}
                            {item.isVariable&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:C.orangeLight,color:C.orange,fontWeight:600}}>변동</span>}
                          </div>
                          {item.destination&&<div style={{fontSize:11,color:C.textMuted}}>{item.destination}</div>}
                        </div>
                        <div style={{textAlign:"right",minWidth:80}}>
                          <div style={{fontSize:14,fontWeight:700,color:C.text}}>{fmt(parseFloat(item.amount)||0)}</div>
                          {filter!=="all"&&!item.isPersonal&&n>1&&<div style={{fontSize:11,color:C.textSub}}>1인 {fmt(amt)}</div>}
                        </div>
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>{setEditItem(item);setShowForm(true);}} style={{background:C.orangeLight,border:`1px solid ${C.orangeDim}`,borderRadius:6,padding:"4px 8px",color:C.orange,fontSize:11,fontWeight:600,cursor:"pointer"}}>수정</button>
                          <button onClick={()=>setItems(items.filter(i=>i.id!==item.id))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",color:C.textSub,fontSize:11,cursor:"pointer"}}>삭제</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {showForm&&(
            <ItemModal
              onClose={()=>{setShowForm(false);setEditItem(null);}}
              onSave={form=>{
                if(editItem) setItems(items.map(i=>i.id===editItem.id?{...form,id:editItem.id}:i));
                else setItems([...items,{...form,id:uid()}]);
                setShowForm(false);setEditItem(null);
              }}
              editItem={editItem} destOptions={destOptions} members={members}
            />
          )}
        </div>
      );
    }

    // ── 시나리오 탭 ─────────────────────────────────────────────
    function ScenarioTab({project}){
      const {items,budget,members=[]}=project;
      const [filter,setFilter]=useState("all");
      const [expandedScenario,setExpandedScenario]=useState(null);

      const budgetNum=parseFloat(budget)||0;
      const n=members.length||1;
      const scenarios=useMemo(()=>generateScenarios(items),[items]);
      const minS=scenarios.reduce((a,b)=>a.total<b.total?a:b,scenarios[0]);
      const maxS=scenarios.reduce((a,b)=>a.total>b.total?a:b,scenarios[0]);

      const calcScenarioAmt=(scenario)=>{
        if(filter==="all") return scenario.total;
        return scenario.items.reduce((s,item)=>{
          const amt=parseFloat(item.amount)||0;
          if(item.isPersonal) return item.personalOwner===filter?s+amt:s;
          return s+amt/n;
        },0);
      };

      const scenariosWithFilter=scenarios.map(s=>({...s,filteredTotal:calcScenarioAmt(s)}));
      const minFiltered=scenariosWithFilter.reduce((a,b)=>a.filteredTotal<b.filteredTotal?a:b,scenariosWithFilter[0]);
      const maxFiltered=scenariosWithFilter.reduce((a,b)=>a.filteredTotal>b.filteredTotal?a:b,scenariosWithFilter[0]);

      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
          {members.length>0&&<FilterBar members={members} selected={filter} onChange={v=>{setFilter(v);setExpandedScenario(null);}}/>}
          <div style={{flex:1,overflowY:"auto",padding:"18px 16px",background:C.bg}}>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))",gap:10,marginBottom:20}}>
              {[
                {label:"시나리오 수",value:scenarios.length+"개"},
                {label:filter==="all"?"최저 비용":`${filter} 최저`,value:fmt(minFiltered?.filteredTotal||0),accent:C.min},
                {label:filter==="all"?"최고 비용":`${filter} 최고`,value:fmt(maxFiltered?.filteredTotal||0),accent:C.max},
                {label:"변동 폭",value:fmt((maxFiltered?.filteredTotal||0)-(minFiltered?.filteredTotal||0)),accent:C.orange},
              ].map((c,i)=>(
                <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{fontSize:10,color:C.textSub,marginBottom:5,fontWeight:600}}>{c.label}</div>
                  <div style={{fontSize:15,fontWeight:700,color:c.accent||C.text}}>{c.value}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {scenariosWithFilter.map((s,i)=>{
                const isMin=s===minFiltered,isMax=s===maxFiltered;
                const ratio=budgetNum?s.filteredTotal/budgetNum:0;
                const isExp=expandedScenario===i;
                return(
                  <div key={i} style={{background:C.card,border:isMin?`1px solid ${C.minBorder}`:isMax?`1px solid ${C.maxBorder}`:`1px solid ${C.border}`,borderRadius:13,overflow:"hidden"}}>
                    <div onClick={()=>setExpandedScenario(isExp?null:i)} style={{padding:"15px 16px",cursor:"pointer",background:isMin?C.minBg:isMax?C.maxBg:C.card}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:budgetNum>0?8:0}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                            <span style={{fontSize:13,fontWeight:700}}>{s.label}</span>
                            {isMin&&<span style={{fontSize:10,background:C.minBg,color:C.min,padding:"2px 7px",borderRadius:99,fontWeight:700,border:`1px solid ${C.minBorder}`}}>최저</span>}
                            {isMax&&<span style={{fontSize:10,background:C.maxBg,color:C.max,padding:"2px 7px",borderRadius:99,fontWeight:700,border:`1px solid ${C.maxBorder}`}}>최고</span>}
                          </div>
                          {s.subtitle&&<div style={{fontSize:12,color:C.textSub}}>{s.subtitle}</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div>
                            <div style={{fontSize:17,fontWeight:700,color:isMin?C.min:isMax?C.max:C.orange,whiteSpace:"nowrap",textAlign:"right"}}>{fmt(s.filteredTotal)}</div>
                            {filter!=="all"&&<div style={{fontSize:10,color:C.textSub,textAlign:"right"}}>전체 {fmt(s.total)}</div>}
                          </div>
                          <span style={{fontSize:13,color:C.textSub,display:"inline-block",transform:isExp?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</span>
                        </div>
                      </div>
                      {budgetNum>0&&(
                        <div>
                          <div style={{height:4,background:C.border,borderRadius:99,overflow:"hidden"}}>
                            <div style={{height:"100%",borderRadius:99,width:Math.min(100,ratio*100)+"%",background:s.filteredTotal>budgetNum?C.max:isMin?C.min:C.orange}}/>
                          </div>
                          <div style={{fontSize:11,color:C.textSub,marginTop:5}}>
                            {(ratio*100).toFixed(1)}%{s.filteredTotal<=budgetNum?` · 여유 ${fmt(budgetNum-s.filteredTotal)}`:`· 초과 ${fmt(s.filteredTotal-budgetNum)}`}
                          </div>
                        </div>
                      )}
                    </div>
                    {isExp&&(
                      <div style={{borderTop:`1px solid ${C.border}`,padding:"12px 16px 15px",background:C.cardAlt}}>
                        <div style={{fontSize:10,color:C.textSub,marginBottom:10,fontWeight:600}}>항목 ({s.items.length}개)</div>
                        <div style={{display:"flex",flexDirection:"column",gap:7}}>
                          {s.items.filter(item=>filter==="all"||(item.isPersonal?item.personalOwner===filter:true)).map((item,j)=>{
                            const cc=CATEGORY_COLORS[item.category]||CATEGORY_COLORS["기타"];
                            const amt=filter==="all"?(parseFloat(item.amount)||0):item.isPersonal?(parseFloat(item.amount)||0):(parseFloat(item.amount)||0)/n;
                            return(
                              <div key={j} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",background:C.card,borderRadius:9,border:`1px solid ${C.border}`,borderLeft:item.isVariable?`3px solid ${C.orange}`:item.isPersonal?`3px solid #7B8CE6`:`3px solid ${C.border}`}}>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                    <span style={{fontSize:13,fontWeight:500}}>{item.name}</span>
                                    <span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:cc.bg,color:cc.text,fontWeight:600}}>{item.category}</span>
                                    {item.isPersonal?<span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:"#EEEEF8",color:"#4A5AB0",fontWeight:600}}>개인</span>:<span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:"#F0EDED",color:"#6B5550",fontWeight:600}}>공동</span>}
                                  </div>
                                  {item.date&&<div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{item.date}{item.destination?` · ${item.destination}`:""}</div>}
                                </div>
                                <div style={{textAlign:"right"}}>
                                  <div style={{fontSize:13,fontWeight:700,color:C.text,whiteSpace:"nowrap"}}>{fmt(amt)}</div>
                                  {filter!=="all"&&!item.isPersonal&&n>1&&<div style={{fontSize:10,color:C.textSub}}>전체 {fmt(parseFloat(item.amount)||0)}</div>}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
                          <span style={{fontSize:12,color:C.textSub,fontWeight:600}}>합계</span>
                          <span style={{fontSize:15,fontWeight:700,color:isMin?C.min:isMax?C.max:C.orange}}>{fmt(s.filteredTotal)}</span>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ── 정산 탭 ─────────────────────────────────────────────────
    function SettleTab({project,onUpdate}){
      const {members=[],settleItems=[],settledPairs=[],items=[]}=project;
      const [editSettleId,setEditSettleId]=useState(null);

      function updateSettleItem(id,changes){
        const next=settleItems.map(i=>i.id===id?{...i,...changes}:i);
        onUpdate({...project,settleItems:next});
      }

      const [showPlanPicker,setShowPlanPicker]=useState(false);

      function addSettleItem(){
        const newItem={
          id:uid(), name:"", amount:"", actualAmount:"",
          settlePayer:"", settleParticipants:[], isPersonal:false,
        };
        onUpdate({...project,settleItems:[...settleItems,newItem]});
        setEditSettleId(newItem.id);
      }

      function importFromPlan(planItem){
        const already=settleItems.some(s=>s.planItemId===planItem.id);
        if(already) return;
        const newItem={
          id:uid(), planItemId:planItem.id,
          name:planItem.name, amount:planItem.amount, actualAmount:"",

    function ProjectView({project,onUpdate,isShared}){
      const [tab,setTab]=useState("plan");

      const [showShareModal,setShowShareModal]=useState(false);
      const [showMemberBar,setShowMemberBar]=useState(false);

      const dlRef=useRef(null);
      const memberRef=useRef(null);
      const members=project.members||[];

      function addMember(){
        if(!newMember.trim()) return;
        onUpdate({...project,members:[...members,newMember.trim()]});
        setNewMember("");setShowAddMember(false);
      }
      function removeMember(m){
        onUpdate({...project,members:members.filter(x=>x!==m)});
      }

      useEffect(()=>{
        const h=e=>{
          if(dlRef.current&&!dlRef.current.contains(e.target))setShowDownloadMenu(false);
          if(memberRef.current&&!memberRef.current.contains(e.target)){setShowMemberBar(false);setShowAddMember(false);setNewMember("");}
        };
        document.addEventListener("mousedown",h);
        return()=>document.removeEventListener("mousedown",h);
      },[]);

      async function captureTab(targetTab,format){
        setShowDownloadMenu(false);
        const prevTab=tab;
        if(tab!==targetTab){setTab(targetTab);await new Promise(r=>setTimeout(r,400));}
        const el=document.getElementById("capture-area");
        const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:"#F2ECEC"});
        const imgData=canvas.toDataURL("image/jpeg",0.95);
        const label=targetTab==="plan"?"계획":targetTab==="scenario"?"시나리오":"정산";
        const fname=`${project.name}_${label}`;
        if(format==="jpg"){const a=document.createElement("a");a.href=imgData;a.download=`${fname}.jpg`;a.click();}
        else{const{jsPDF}=window.jspdf;const w=canvas.width/2,h=canvas.height/2;const pdf=new jsPDF({orientation:w>h?"l":"p",unit:"px",format:[w,h]});pdf.addImage(imgData,"JPEG",0,0,w,h);pdf.save(`${fname}.pdf`);}
        setTab(prevTab);
      }

      return(
        <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>

                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,color:C.orange,fontSize:13,fontWeight:700,padding:"3px 8px",width:100,textAlign:"right",outline:"none"}}/>
              </div>
              {!isShared&&(
                <button onClick={()=>setShowShareModal(true)} style={{background:C.orangeLight,border:`1px solid ${C.orangeDim}`,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:700,color:C.orange,cursor:"pointer",whiteSpace:"nowrap"}}>🔗 공유</button>
              )}
              {/* 인원 버튼 */}
              <div style={{position:"relative"}} ref={memberRef}>
                <button onClick={()=>setShowMemberBar(v=>!v)}
                  style={{background:showMemberBar?C.orangeLight:C.card,border:`1px solid ${showMemberBar?C.orange:C.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,color:showMemberBar?C.orange:C.textSub,cursor:"pointer",whiteSpace:"nowrap"}}>
                  👥{members.length>0?` ${members.length}명`:""}
                </button>
                {showMemberBar&&(
                  <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:150,minWidth:220,padding:"14px 16px"}}>
                    <div style={{fontSize:11,color:C.textSub,fontWeight:600,marginBottom:10}}>참여 인원</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7,alignItems:"center",marginBottom:8}}>
                      {members.map(m=>(
                        <div key={m} style={{display:"flex",alignItems:"center",gap:4,background:C.orangeLight,borderRadius:99,padding:"4px 10px 4px 12px"}}>
                          <span style={{fontSize:12,fontWeight:600,color:C.orange}}>{m}</span>
                          <button onClick={()=>removeMember(m)} style={{background:"none",border:"none",color:C.orangeDim,cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 0 0 2px"}}>×</button>
                        </div>
                      ))}
                    </div>
                    {showAddMember?(
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <input autoFocus value={newMember} onChange={e=>setNewMember(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()} placeholder="이름 입력" style={{...inputStyle,flex:1,padding:"6px 10px",fontSize:12}}/>

                    )}

                )}
              </div>
              <div ref={dlRef} style={{position:"relative"}}>
                <button onClick={()=>setShowDownloadMenu(v=>!v)} style={{background:C.orange,color:"#FFF",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>

                        <button onClick={()=>captureTab(k,"pdf")} style={{width:"100%",padding:"7px 16px 10px",background:"none",border:"none",textAlign:"left",fontSize:13,color:C.text,cursor:"pointer"}}>📄 PDF</button>
                      </div>

                  </div>
                )}
              </div>
            </div>
          </div>

          <div id="capture-area" style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>

            {tab==="settle"&&<SettleTab project={project} onUpdate={onUpdate}/>}
          </div>

          {showShareModal&&<ShareModal project={project} onClose={()=>setShowShareModal(false)}/>}
        </div>
      );
    }

    // ── 공유용 앱 ─────────────────────────────────────────────────
    function saveProjectToFirebase(project) {
      if(!window.__db) return;
      const data = {
        id:project.id, name:project.name, budget:project.budget,
        members:project.members||[],
        settleItems:project.settleItems||[],
        settledPairs:project.settledPairs||[],
        items:project.items.reduce((acc,item)=>{acc[item.id]=item;return acc;},{}),
      };
      window.__dbSet(window.__dbRef(window.__db,`projects/${project.id}`),data).catch(console.error);
    }

    function useFirebase() {
      const [ready,setReady]=useState(!!window.__firebaseReady);
      useEffect(()=>{
        if(window.__firebaseReady){setReady(true);return;}
        const h=()=>setReady(true);
        window.addEventListener("firebaseReady",h);
        return()=>window.removeEventListener("firebaseReady",h);
      },[]);
      return ready;
    }

    function App(){
      const fbReady=useFirebase();
      const projectId=new URLSearchParams(window.location.search).get("id");
      const [project,setProject]=useState(null);
      const [loading,setLoading]=useState(true);
      const [notFound,setNotFound]=useState(false);

      useEffect(()=>{
        if(!projectId||!fbReady) return;
        const unsub=window.__dbOnValue(window.__dbRef(window.__db,`projects/${projectId}`),snap=>{
          const data=snap.val();
          setLoading(false);
          if(!data){setNotFound(true);return;}
          setProject({...data,items:data.items?Object.values(data.items):[],members:data.members||[],settleItems:data.settleItems||[],settledPairs:data.settledPairs||[]});
        });
        return unsub;
      },[projectId,fbReady]);

      function updateProject(updated){
        saveProjectToFirebase(updated);
        setProject(updated);
      }

      if(!projectId) return(
        <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:C.bg,flexDirection:"column",gap:12,fontFamily:"Pretendard, sans-serif"}}>
          <div style={{fontSize:24}}>🔗</div>
          <div style={{fontSize:16,fontWeight:700,color:"#2C1A10"}}>잘못된 접근이에요</div>
          <div style={{fontSize:13,color:"#9A7A70"}}>공유 링크로만 접속할 수 있어요.</div>
        </div>
      );
      if(loading) return(
        <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:C.bg,flexDirection:"column",gap:12,fontFamily:"Pretendard, sans-serif"}}>
          <div style={{fontSize:24}}>⏳</div>
          <div style={{fontSize:14,color:"#9A7A70"}}>불러오는 중...</div>
        </div>
      );
      if(notFound) return(
        <div style={{display:"flex",height:"100vh",alignItems:"center",justifyContent:"center",background:C.bg,flexDirection:"column",gap:12,fontFamily:"Pretendard, sans-serif"}}>
          <div style={{fontSize:24}}>😕</div>
          <div style={{fontSize:16,fontWeight:700,color:"#2C1A10"}}>프로젝트를 찾을 수 없어요</div>
          <div style={{fontSize:13,color:"#9A7A70"}}>링크가 잘못됐거나 삭제된 프로젝트예요.</div>
        </div>
      );
      return(
        <div style={{display:"flex",height:"100vh",flexDirection:"column",background:C.bgApp,fontFamily:"Pretendard, sans-serif",color:C.text}}>
          <div style={{padding:"14px 18px",background:C.bgHeader,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:18}}>🔗</div>
            <div>
              <div style={{fontSize:10,color:C.textSub,letterSpacing:2,fontWeight:600}}>공유된 프로젝트</div>
              <div style={{fontSize:18,fontWeight:800,color:C.text}}>{project?.name}</div>
            </div>
          </div>
          {project&&<ProjectView project={project} onUpdate={updateProject} isShared={true}/>}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
